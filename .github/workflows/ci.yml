name: ci
on: [push, pull_request]
jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env: { POSTGRES_HOST_AUTH_METHOD: trust, POSTGRES_USER: postgres, POSTGRES_DB: d10net_test }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 2s --health-timeout 2s --health-retries 15
    env:
      TEST_DATABASE_URL: postgres://postgres@127.0.0.1:5432/d10net_test
      DATABASE_URL: postgres://postgres@127.0.0.1:5432/d10net_test
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.13.1 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm --filter @daily/api drizzle-kit check
      - run: pnpm test
      - run: pnpm build
      - run: pnpm seed:test
      - run: pnpm playwright test
